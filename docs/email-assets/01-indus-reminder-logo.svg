  <path d="M126 148c0-25 18-43 42-43 17 0 30 8 36 22l-20 9c-3-8-9-12-17-12-11 0-20 9-20 24 0 14 9 24 20 24 8 0 14-4 17-12l20 9c-6 14-19 22-36 22-24 0-42-18-42-43z" fill="#ffffff"/>

