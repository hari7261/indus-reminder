<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      .title { font: 700 30px 'Segoe UI', sans-serif; fill: #1e293b; }
      .pkg { fill: #ffffff; stroke: #1e293b; stroke-width: 2; rx: 10; }
      .label { font: 600 18px 'Segoe UI', sans-serif; fill: #1e293b; }
      .small { font: 14px 'Segoe UI', sans-serif; fill: #334155; }
      .dep { stroke: #1e293b; stroke-width: 2.3; fill: none; marker-end: url(#a); }
    </style>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#1e293b"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="760" fill="#eef2ff"/>
  <text x="50" y="60" class="title">UML Package Diagram</text>

  <rect x="90" y="160" width="300" height="170" class="pkg"/>
  <text x="140" y="205" class="label">cmd/indus-reminder</text>
  <text x="120" y="235" class="small">run(), env defaults, sunday guard</text>
  <text x="120" y="260" class="small">checklist file reader</text>

  <rect x="450" y="140" width="300" height="220" class="pkg"/>
  <text x="525" y="185" class="label">internal/mailer</text>
  <text x="480" y="215" class="small">Config, Message, Sender, SMTPClient</text>
  <text x="480" y="240" class="small">LoadConfigFromEnv(), Send()</text>

  <rect x="820" y="160" width="280" height="170" class="pkg"/>
  <text x="900" y="205" class="label">net/smtp</text>
  <text x="850" y="235" class="small">smtp.SendMail(), smtp.PlainAuth()</text>

  <rect x="450" y="430" width="300" height="170" class="pkg"/>
  <text x="555" y="475" class="label">checklist.md</text>
  <text x="490" y="505" class="small">Versioned source for mail body</text>

  <rect x="90" y="430" width="300" height="170" class="pkg"/>
  <text x="165" y="475" class="label">.github/workflows</text>
  <text x="130" y="505" class="small">schedule + build + execute binary</text>

  <path class="dep" d="M 390 230 L 450 230"/>
  <text x="400" y="215" class="small">imports</text>

  <path class="dep" d="M 750 230 L 820 230"/>
  <text x="760" y="215" class="small">uses</text>

  <path class="dep" d="M 600 430 L 600 360"/>
  <text x="620" y="395" class="small">reads</text>

  <path class="dep" d="M 240 430 L 240 330"/>
  <text x="260" y="390" class="small">runs</text>
</svg>
