<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      .title { font: 700 30px 'Segoe UI', sans-serif; fill: #111827; }
      .label { font: 600 17px 'Segoe UI', sans-serif; fill: #111827; }
      .small { font: 14px 'Segoe UI', sans-serif; fill: #374151; }
      .node { fill: #fff; stroke: #111827; stroke-width: 2; rx: 12; }
      .edge { stroke: #111827; stroke-width: 2.5; fill: none; marker-end: url(#arr); }
    </style>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="760" fill="#fff7ed"/>
  <text x="50" y="60" class="title">Deployment / Execution Diagram</text>

  <rect x="80" y="120" width="500" height="560" class="node" fill="#fffbeb"/>
  <text x="110" y="160" class="label">GitHub Cloud</text>

  <rect x="120" y="200" width="420" height="190" class="node"/>
  <text x="170" y="240" class="label">GitHub-hosted Runner (ubuntu-latest)</text>
  <text x="150" y="275" class="small">- checkout repository</text>
  <text x="150" y="300" class="small">- setup Go toolchain</text>
  <text x="150" y="325" class="small">- build binary</text>
  <text x="150" y="350" class="small">- execute reminder process</text>

  <rect x="120" y="430" width="420" height="170" class="node"/>
  <text x="210" y="470" class="label">Repository Contents</text>
  <text x="150" y="500" class="small">cmd/, internal/, checklist.md, workflow file</text>

  <rect x="700" y="170" width="420" height="220" class="node" fill="#f0f9ff"/>
  <text x="860" y="210" class="label">Gmail SMTP Endpoint</text>
  <text x="770" y="245" class="small">smtp.gmail.com:587 with app password auth</text>
  <text x="770" y="270" class="small">encrypted SMTP transaction</text>

  <rect x="700" y="450" width="420" height="170" class="node" fill="#f0fdf4"/>
  <text x="860" y="490" class="label">Recipient Mailbox</text>
  <text x="780" y="520" class="small">receives daily checklist reminder email</text>

  <path class="edge" d="M 540 310 L 700 280"/>
  <text x="575" y="280" class="small">SMTP send</text>

  <path class="edge" d="M 910 390 L 910 450"/>
  <text x="930" y="425" class="small">mail delivery</text>

  <path class="edge" d="M 330 430 L 330 390"/>
  <text x="350" y="415" class="small">read checklist</text>
</svg>
