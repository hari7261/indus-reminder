<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      .title { font: 700 30px 'Segoe UI', sans-serif; fill: #1f2937; }
      .label { font: 600 17px 'Segoe UI', sans-serif; fill: #1f2937; }
      .small { font: 14px 'Segoe UI', sans-serif; fill: #374151; }
      .comp { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 10; }
      .arrow { stroke: #1f2937; stroke-width: 2.4; fill: none; marker-end: url(#a); }
    </style>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#1f2937"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="760" fill="#f0fdf4"/>
  <text x="50" y="60" class="title">Component Diagram - Indus Reminder</text>

  <rect x="90" y="140" width="350" height="250" class="comp"/>
  <text x="170" y="180" class="label">cmd/indus-reminder</text>
  <text x="130" y="215" class="small">- entrypoint and exit codes</text>
  <text x="130" y="240" class="small">- Sunday skip logic</text>
  <text x="130" y="265" class="small">- checklist file loading</text>
  <text x="130" y="290" class="small">- environment defaults</text>

  <rect x="500" y="140" width="330" height="250" class="comp"/>
  <text x="585" y="180" class="label">internal/mailer</text>
  <text x="540" y="215" class="small">- Config validation</text>
  <text x="540" y="240" class="small">- SMTP payload builder</text>
  <text x="540" y="265" class="small">- SMTPClient.Send()</text>
  <text x="540" y="290" class="small">- explicit error propagation</text>

  <rect x="900" y="140" width="230" height="120" class="comp"/>
  <text x="940" y="185" class="label">net/smtp</text>
  <text x="935" y="215" class="small">stdlib transport</text>

  <rect x="90" y="470" width="350" height="170" class="comp"/>
  <text x="200" y="510" class="label">checklist.md</text>
  <text x="120" y="540" class="small">Versioned checklist template in repo</text>

  <rect x="500" y="470" width="330" height="170" class="comp"/>
  <text x="610" y="510" class="label">GitHub Actions</text>
  <text x="530" y="540" class="small">Schedules, builds, runs binary in CI</text>

  <rect x="900" y="470" width="230" height="170" class="comp"/>
  <text x="960" y="510" class="label">Gmail SMTP</text>
  <text x="930" y="540" class="small">Authenticated email delivery</text>

  <path class="arrow" d="M 440 230 L 500 230"/>
  <path class="arrow" d="M 830 210 L 900 210"/>
  <path class="arrow" d="M 265 470 L 265 390"/>
  <path class="arrow" d="M 665 470 L 665 390"/>
  <path class="arrow" d="M 830 555 L 900 555"/>

  <text x="70" y="700" class="small">All secrets remain external to source and are injected via workflow environment variables.</text>
</svg>
