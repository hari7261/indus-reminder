<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937" />
    </marker>
    <style>
      .title { font: 700 30px 'Segoe UI', sans-serif; fill: #111827; }
      .label { font: 600 18px 'Segoe UI', sans-serif; fill: #111827; }
      .small { font: 14px 'Segoe UI', sans-serif; fill: #374151; }
      .box { fill: #f8fafc; stroke: #1f2937; stroke-width: 2; rx: 12; }
      .line { stroke: #1f2937; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .bg { fill: url(#g); }
    </style>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0f2fe" />
      <stop offset="100%" stop-color="#fef9c3" />
    </linearGradient>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="720" />
  <text x="50" y="60" class="title">Indus Reminder - System Overview</text>

  <rect class="box" x="70" y="140" width="260" height="120" />
  <text class="label" x="105" y="190">GitHub Actions</text>
  <text class="small" x="110" y="220">UTC cron scheduler</text>

  <rect class="box" x="440" y="110" width="320" height="180" />
  <text class="label" x="520" y="165">Go CLI Binary</text>
  <text class="small" x="485" y="195">cmd/indus-reminder/main.go</text>
  <text class="small" x="535" y="220">Sunday guard</text>
  <text class="small" x="507" y="245">loads env + checklist</text>

  <rect class="box" x="450" y="360" width="300" height="140" />
  <text class="label" x="530" y="415">checklist.md</text>
  <text class="small" x="490" y="445">Repository checklist content</text>

  <rect class="box" x="870" y="130" width="250" height="120" />
  <text class="label" x="930" y="180">Gmail SMTP</text>
  <text class="small" x="915" y="210">smtp.gmail.com:587</text>

  <rect class="box" x="860" y="360" width="280" height="140" />
  <text class="label" x="930" y="420">Recipient Inbox</text>
  <text class="small" x="900" y="450">work tracker reminder email</text>

  <path class="line" d="M 330 200 L 440 200" />
  <text class="small" x="350" y="185">run binary</text>

  <path class="line" d="M 600 290 L 600 360" />
  <text class="small" x="620" y="335">read checklist</text>

  <path class="line" d="M 760 200 L 870 190" />
  <text class="small" x="785" y="175">SMTP send</text>

  <path class="line" d="M 995 250 L 995 360" />
  <text class="small" x="1010" y="312">deliver email</text>

  <text class="small" x="70" y="660">Environment variables: SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASS, MAIL_TO</text>
</svg>
