name: Daily Indus Reminder

on:
  schedule:
    - cron: "0 11 * * 1-6"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send-reminder:
    name: Build and send reminder
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      MAIL_TO: ${{ secrets.MAIL_TO }}
      MAIL_SUBJECT: ${{ vars.MAIL_SUBJECT }}
      REMINDER_TZ: Asia/Kolkata
      CHECKLIST_FILE: checklist.md

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: false

      - name: Build binary
        run: go build -trimpath -ldflags="-s -w" -o indus-reminder ./cmd/indus-reminder

      - name: Execute reminder
        run: ./indus-reminder
